name: Build & Deploy Warfork

on:
  workflow_dispatch:
    inputs:
      release_branch:
        description: 'Steam release branch'
        required: true
        default: 'beta'
        type: string
jobs:
  linux:
    uses: ./.github/workflows/linux-build.yml
    with:
      config: 'release'
    secrets: inherit

  macos:
    uses: ./.github/workflows/macos-build.yml
    with:
      config: 'release'
      arch: 'x86_64'
    secrets: inherit

  windows:
    uses: ./.github/workflows/windows-build.yml
    with:
      config: 'release'
    secrets: inherit

  # Prepare builds for Steam deployment
  prepare-steam-build:
    needs: [linux, macos, windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Prepare Steam depot structure
        run: |
          mkdir -p steam-build/windows steam-build/linux steam-build/macos
          
          # Extract Windows build
          cd artifacts/win-x86_64-release
          unzip -o *.zip -d ../../steam-build/windows/
          cd ../..

          # Extract Linux build  
          cd artifacts/linux-x86_64-release
          tar -xzf *.tar.gz -C ../../steam-build/linux/
          cd ../..

          # Extract macOS build
          cd artifacts/osx-x86_64-release
          tar -xzf *.tar.gz
          cp -r ./RelWithDebInfo/Warfork.app ../../steam-build/macos/
          cd ../..

          # List structure for debugging
          find steam-build -type f | head -20

      - name: Remove steam_appid.txt from all depots
        run: | # find then remove steam_appid.txt files from all depots 
          find steam-build -type f -name steam_appid.txt -exec rm -v {} \;

      - name: Sentry Upload
        run: |
          curl -sL https://sentry.io/get-cli/ | bash
          sentry-cli --version
          sentry-cli debug-files upload steam-build/
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: team-forbidden-llc
          SENTRY_PROJECT: warfork

      - name: Upload prepared Steam build
        uses: actions/upload-artifact@v4
        with:
          name: steam-build
          path: steam-build/

  # Deploy to Steam
  deploy:
    needs: prepare-steam-build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        steam_app:
          # client
          - id: '671610'
            desc: 'Warfork build'
            depot4: ''
            depot5: 'windows'
            depot6: 'linux'
            depot7: 'linux'
            depot8: 'macos'
          # dedicated server
          - id: '1136510'
            desc: 'Warfork Dedicated Server build'
            depot4: 'windows'
            depot5: ''
            depot6: ''
            depot7: 'macos'
            depot8: 'linux'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Download prepared Steam build
        uses: actions/download-artifact@v4
        with:
          name: steam-build
          path: steam-build

      - name: Deploy to Steam
        uses: game-ci/steam-deploy@v3
        with:
          username: ${{ secrets.STEAM_USERNAME }}
          configVdf: ${{ secrets.STEAM_CONFIG_VDF }}
          appId: ${{ matrix.steam_app.id }}
          buildDescription: "${{ matrix.steam_app.desc }} ${{ github.sha }}"
          rootPath: steam-build
          depot4Path: ${{ matrix.steam_app.depot4 }}
          depot5Path: ${{ matrix.steam_app.depot5 }}
          depot6Path: ${{ matrix.steam_app.depot6 }}
          depot7Path: ${{ matrix.steam_app.depot7 }}
          depot8Path: ${{ matrix.steam_app.depot8 }}
          releaseBranch: ${{ inputs.release_branch }}
          debugBranch: true
