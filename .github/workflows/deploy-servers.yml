# ─────────────────────────────────────────────────────────────────────────────
# Warfork Server Deploy
# Deploys and updates game servers across regions using a matrix strategy.
# Uses appleboy/ssh-action to execute commands on Digital Ocean droplets.
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy Servers

on:
  workflow_dispatch:
    inputs:
      steam_branch:
        description: 'Steam branch to deploy'
        required: true
        type: choice
        options:
          - beta
          - public
        default: beta
      regions:
        description: 'Regions to deploy (comma-separated, or "all")'
        required: true
        type: string
        default: 'all'
      server_types:
        description: 'Server types to deploy (comma-separated, or "all")'
        required: true
        type: string
        default: 'all'
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - provision
          - update-and-restart
          - update-only
          - restart-only
          - stop
          - status
        default: update-and-restart

  # Reusable workflow — called by update-servers, restart-servers, etc.
  workflow_call:
    inputs:
      steam_branch:
        required: true
        type: string
      regions:
        required: true
        type: string
      server_types:
        required: true
        type: string
      action:
        required: true
        type: string

# Only allow one deploy at a time
concurrency:
  group: server-deploy
  cancel-in-progress: false

jobs:
  # ─── Build the matrix dynamically ────────────────────────────────────────
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      server_matrix: ${{ steps.set-matrix.outputs.server_matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Build deployment matrix
        id: set-matrix
        env:
          CONFIG: .github/server-management/server-config.json
          REGIONS: ${{ inputs.regions }}
          TYPES: ${{ inputs.server_types }}
        run: bash .github/scripts/build-matrix.sh

  # ─── Setup server environment (runs once per region/host) ────────────────
  setup-server:
    needs: prepare-matrix
    # Only run setup if we are deploying/updating (skip for status-only if desired, 
    # but user request implies always separating it. Let's keep the logic consistent.)
    if: inputs.action == 'update-and-restart' || inputs.action == 'provision' || inputs.action == 'update-only'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.server_matrix) }}
      fail-fast: false
      max-parallel: 4
    name: "Setup ${{ matrix.region_label }}"
    steps:
      - uses: actions/checkout@v4

      - name: Upload Warfork.sh to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ matrix.host }}
          username: root
          key: ${{ secrets[matrix.key_secret] }}
          port: 22
          source: ".github/server-management/Warfork.sh"
          target: "/app/scripts/"
          strip_components: 2

      - name: Upload server configs
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ matrix.host }}
          username: root
          key: ${{ secrets[matrix.key_secret] }}
          port: 22
          source: ".github/server-management/configs/"
          target: "/app/server/basewf/"
          strip_components: 2

      - name: Make Warfork.sh executable
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ matrix.host }}
          username: root
          key: ${{ secrets[matrix.key_secret] }}
          port: 22
          script: | 
            chmod +x /app/scripts/Warfork.sh
            /app/scripts/Warfork.sh provision

  # ─── Deploy to each server instance in the matrix ────────────────────────
  deploy:
    needs: [prepare-matrix, setup-server]
    # If setup-server was skipped (status action), deploy should still run if needed?
    # Actually, if action is status, setup-server is skipped. Deploy should run.
    # If action is NOT status, setup-server runs. Deploy must wait for it.
    if: |
      always() &&
      needs.prepare-matrix.result == 'success' &&
      (needs.setup-server.result == 'success' || needs.setup-server.result == 'skipped')
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
      fail-fast: false
      max-parallel: 4
    name: "${{ matrix.region_label }} - ${{ matrix.type_label }}"
    steps:
      - name: Execute server action
        uses: appleboy/ssh-action@v1.2.0
        env:
          STEAM_BRANCH: ${{ inputs.steam_branch }}
          SERVER_TYPE: ${{ matrix.server_type }}
          WF_PARAMS: ${{ matrix.wf_params }}
          REGION_LABEL: ${{ matrix.region_label }}
          ACTION: ${{ inputs.action }}
          RCON_PASSWORD: ${{ secrets.SERVER_RCON_PASSWORD }}
          OPERATOR_PASSWORD: ${{ secrets.SERVER_OPERATOR_PASSWORD }}
        with:
          host: ${{ matrix.host }}
          username: root
          key: ${{ secrets[matrix.key_secret] }}
          port: 22
          envs: STEAM_BRANCH,SERVER_TYPE,WF_PARAMS,REGION_LABEL,ACTION,RCON_PASSWORD,OPERATOR_PASSWORD
          command_timeout: 15m
          script: |
            useradd wf || echo "wf User already exists."
            mkdir -p /home/wf
            chown wf:wf /home/wf

            # Substitute region label into params (for hostname)
            export WF_PARAMS=$(echo "${WF_PARAMS}" | sed "s/\${REGION_LABEL}/${REGION_LABEL}/g")

            # Inject credentials if set
            [ -n "${RCON_PASSWORD}" ]    && WF_PARAMS="${WF_PARAMS} +set rcon_password \"${RCON_PASSWORD}\""
            [ -n "${OPERATOR_PASSWORD}" ] && WF_PARAMS="${WF_PARAMS} +set g_operator_password \"${OPERATOR_PASSWORD}\""

            export STEAM_BRANCH="${STEAM_BRANCH}"
            export SERVER_TYPE="${SERVER_TYPE}"

            # Script handles tmux sessions internally (named wf-{port})
            SUDO_CMD="sudo -u wf STEAM_BRANCH='${STEAM_BRANCH}' SERVER_TYPE='${SERVER_TYPE}' WF_PARAMS='${WF_PARAMS}' REGION_LABEL='${REGION_LABEL}' ACTION='${ACTION}' RCON_PASSWORD='${RCON_PASSWORD}' OPERATOR_PASSWORD='${OPERATOR_PASSWORD}'"

            case "${ACTION}" in
              provision)
                eval $SUDO_CMD /app/scripts/Warfork.sh run
                ;;
              update-and-restart)
                eval $SUDO_CMD /app/scripts/Warfork.sh stop
                eval $SUDO_CMD /app/scripts/Warfork.sh start
                ;;
              update-only)
                eval $SUDO_CMD /app/scripts/Warfork.sh restart
                ;;
              restart-only)
                eval $SUDO_CMD /app/scripts/Warfork.sh restart
                ;;
              stop)
                eval $SUDO_CMD /app/scripts/Warfork.sh stop
                ;;
              status)
                eval $SUDO_CMD /app/scripts/Warfork.sh status || true
                ;;
            esac

  # ─── Summary ─────────────────────────────────────────────────────────────
  summary:
    needs: [prepare-matrix, deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Deployment summary
        run: |
          echo "## Warfork Server Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ inputs.steam_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Regions | \`${{ inputs.regions }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Server Types | \`${{ inputs.server_types }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Action | \`${{ inputs.action }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Time | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
